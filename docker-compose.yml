services:
  postgres:
    image: postgres:17-alpine
    container_name: vetcare-pro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vetcare_pro
      POSTGRES_USER: vetcare
      POSTGRES_PASSWORD: vetcare_dev
    ports:
      - "127.0.0.1:54329:5432"
    volumes:
      - vetcare_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U vetcare -d vetcare_pro
      interval: 3s
      timeout: 3s
      retries: 15

volumes:
  vetcare_postgres_data:
    name: vetcare-pro-postgres-data

