appId: com.mancarsoftware.vetcarepro
productName: VetCare Pro
copyright: Copyright (c) 2026 MancarSoftware

directories:
  output: dist

files:
  - out/**
  - package.json

extraResources:
  - from: ../../release/runtime
    to: runtime
  - from: build/icon.ico
    to: icon.ico

asar: true
compression: maximum

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: VetCare-Pro-Setup-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: VetCare Pro
  uninstallDisplayName: VetCare Pro

publish: null
